<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="A Phaser 4 PWA with 64 bouncing circles." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>vibe_codex_bouncer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #1e293b 0%, #0f172a 55%, #020617 100%);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
      }

      #app {
        position: relative;
      }

      .hud {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: max(12px, env(safe-area-inset-left));
        z-index: 10;
        padding: 0.7rem 0.9rem;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.72);
        color: #e2e8f0;
        backdrop-filter: blur(14px);
      }

      .hud h1,
      .hud p {
        margin: 0;
      }

      .hud h1 {
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .hud p {
        margin-top: 0.25rem;
        font-size: 0.85rem;
        color: #cbd5e1;
      }

      canvas {
        display: block;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="hud" aria-hidden="true">
        <h1>vibe_codex_bouncer</h1>
        <p>Phaser 4 · ES2020 · Offline-ready PWA</p>
      </div>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
